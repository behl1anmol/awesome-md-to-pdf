name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0). Must match package.json version."
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  PUPPETEER_SKIP_DOWNLOAD: "1"

jobs:
  publish:
    name: Publish ${{ github.event.release.tag_name || inputs.tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json version matches release tag
        shell: bash
        run: |
          set -euo pipefail
          RAW_TAG="${{ github.event.release.tag_name || inputs.tag }}"
          TAG_VERSION="${RAW_TAG#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "release tag   : $RAW_TAG"
          echo "tag version   : $TAG_VERSION"
          echo "package.json  : $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
