<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" fill="none">
  <defs>
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c96442"/>
      <stop offset="25%"  stop-color="#d97757"/>
      <stop offset="50%"  stop-color="#c68e5c"/>
      <stop offset="75%"  stop-color="#6b7a5a"/>
      <stop offset="100%" stop-color="#5a7a8a"/>
    </linearGradient>
    <linearGradient id="eg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c96442"/>
      <stop offset="30%"  stop-color="#d97757"/>
      <stop offset="60%"  stop-color="#c68e5c"/>
      <stop offset="100%" stop-color="#5a7a8a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c96442"/>
      <stop offset="25%"  stop-color="#d97757"/>
      <stop offset="50%"  stop-color="#c68e5c"/>
      <stop offset="75%"  stop-color="#6b7a5a"/>
      <stop offset="100%" stop-color="#5a7a8a"/>
    </linearGradient>
  </defs>

  <rect width="900" height="260" rx="12" fill="#1b1b1b"/>

  <!-- ================================================================ -->
  <!--  Isometric 4-point starburst (10 cols x 6 rows, 8px cells)       -->
  <!--  Geometry from banner.ts:                                         -->
  <!--    ....HH....      H = outline (#a95236)                          -->
  <!--    ...HTTH...      T = top face (#e8a590)                         -->
  <!--    HLLLTTRRRH      L = left body (#c96442)                        -->
  <!--    HLLLTTRRRH      R = right body (#e8c6a0)                       -->
  <!--    ...HTTH...                                                     -->
  <!--    ....HH....                                                     -->
  <!-- ================================================================ -->
  <g transform="translate(42, 72)">
    <!-- Row 0: ....HH.... -->
    <rect x="40" y="0"  width="10" height="10" fill="#a95236"/>
    <rect x="50" y="0"  width="10" height="10" fill="#a95236"/>
    <!-- Row 1: ...HTTH... -->
    <rect x="30" y="10" width="10" height="10" fill="#a95236"/>
    <rect x="40" y="10" width="10" height="10" fill="#e8a590"/>
    <rect x="50" y="10" width="10" height="10" fill="#e8a590"/>
    <rect x="60" y="10" width="10" height="10" fill="#a95236"/>
    <!-- Row 2: HLLLTTRRRH -->
    <rect x="0"  y="20" width="10" height="10" fill="#a95236"/>
    <rect x="10" y="20" width="10" height="10" fill="#c96442"/>
    <rect x="20" y="20" width="10" height="10" fill="#c96442"/>
    <rect x="30" y="20" width="10" height="10" fill="#c96442"/>
    <rect x="40" y="20" width="10" height="10" fill="#e8a590"/>
    <rect x="50" y="20" width="10" height="10" fill="#e8a590"/>
    <rect x="60" y="20" width="10" height="10" fill="#e8c6a0"/>
    <rect x="70" y="20" width="10" height="10" fill="#e8c6a0"/>
    <rect x="80" y="20" width="10" height="10" fill="#e8c6a0"/>
    <rect x="90" y="20" width="10" height="10" fill="#a95236"/>
    <!-- Row 3: HLLLTTRRRH -->
    <rect x="0"  y="30" width="10" height="10" fill="#a95236"/>
    <rect x="10" y="30" width="10" height="10" fill="#c96442"/>
    <rect x="20" y="30" width="10" height="10" fill="#c96442"/>
    <rect x="30" y="30" width="10" height="10" fill="#c96442"/>
    <rect x="40" y="30" width="10" height="10" fill="#e8a590"/>
    <rect x="50" y="30" width="10" height="10" fill="#e8a590"/>
    <rect x="60" y="30" width="10" height="10" fill="#e8c6a0"/>
    <rect x="70" y="30" width="10" height="10" fill="#e8c6a0"/>
    <rect x="80" y="30" width="10" height="10" fill="#e8c6a0"/>
    <rect x="90" y="30" width="10" height="10" fill="#a95236"/>
    <!-- Row 4: ...HTTH... -->
    <rect x="30" y="40" width="10" height="10" fill="#a95236"/>
    <rect x="40" y="40" width="10" height="10" fill="#e8a590"/>
    <rect x="50" y="40" width="10" height="10" fill="#e8a590"/>
    <rect x="60" y="40" width="10" height="10" fill="#a95236"/>
    <!-- Row 5: ....HH.... -->
    <rect x="40" y="50" width="10" height="10" fill="#a95236"/>
    <rect x="50" y="50" width="10" height="10" fill="#a95236"/>
  </g>

  <!-- ================================================================ -->
  <!--  Eyebrow: &  A W E S O M E  &                                   -->
  <!-- ================================================================ -->
  <text x="500" y="68" text-anchor="middle"
        font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code','Consolas',monospace"
        font-size="15" font-weight="600" letter-spacing="5" fill="url(#eg)">&#x2726;  A W E S O M E  &#x2726;</text>

  <!-- ================================================================ -->
  <!--  Wordmark: MD � TO � PDF                                         -->
  <!--  Thick condensed block letters with gradient fill                 -->
  <!-- ================================================================ -->
  <text x="500" y="145" text-anchor="middle"
        font-family="'Impact','Arial Black','Bahnschrift','Helvetica Neue',sans-serif"
        font-size="76" font-weight="900" letter-spacing="3" fill="url(#wg)">MD &#x2192; TO &#x2192; PDF</text>

  <!-- ================================================================ -->
  <!--  Tagline                                                          -->
  <!-- ================================================================ -->
  <text x="500" y="188" text-anchor="middle"
        font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code','Consolas',monospace"
        font-size="13" fill="#87867f">The editorial markdown-to-PDF tool  &#xB7;  themed by any DESIGN.md</text>

  <!-- ================================================================ -->
  <!--  Quick-start hints                                                -->
  <!-- ================================================================ -->
  <text y="218"
        font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code','Consolas',monospace"
        font-size="11.5">
    <tspan x="220" fill="#87867f">&#x25B8; Browse designs at </tspan><tspan fill="#5a7a8a">getdesign.md</tspan>
    <tspan x="540" fill="#87867f">&#x25B8; </tspan><tspan fill="#c96442">awesome-md-to-pdf</tspan><tspan fill="#87867f"> &lt;dir&gt; --toc --cover</tspan>
  </text>

  <!-- Bottom gradient accent bar -->
  <rect x="0" y="248" width="900" height="12" rx="0" fill="url(#bar)" opacity="0.5"/>
  <rect x="0" y="248" width="12" height="12" fill="#1b1b1b"/>
  <rect x="888" y="248" width="12" height="12" fill="#1b1b1b"/>
  <rect x="0" y="248" width="900" height="12" rx="6" fill="url(#bar)" opacity="0.5"/>
</svg>
